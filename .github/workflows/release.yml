name: Build Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        profile: [standard, complete]

    runs-on: ${{ matrix.os }}
    env:
      MULTISOCIAL_BUILD_PROFILE: ${{ matrix.profile }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PIP_NO_CACHE_DIR: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPYCACHEPREFIX: ${{ github.workspace }}/.tmp/pycache-${{ matrix.os }}-${{ matrix.profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Clear local caches used by packaging tools
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${HOME}/.cache/pip" "${HOME}/.cache/pyinstaller" "${HOME}/Library/Caches/pip" || true

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Pin setuptools for PyInstaller runtime hook compatibility
        run: python -m pip install "setuptools==80.10.2"

      - name: Install standard build dependencies
        if: matrix.profile == 'standard'
        run: python -m pip install ".[dev]"

      - name: Install complete build dependencies
        if: matrix.profile == 'complete'
        run: python -m pip install ".[complete,dev]"

      - name: Build PyInstaller bundle
        env:
          MPLCONFIGDIR: ${{ github.workspace }}/.tmp/mplconfig-${{ matrix.os }}-${{ matrix.profile }}
          PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}/.tmp/pyinstaller-${{ matrix.os }}-${{ matrix.profile }}
        run: pyinstaller --clean --noconfirm MultiSOCIAL.spec

      - name: Validate Windows runtime DLL exclusions
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          profile = os.environ["MULTISOCIAL_BUILD_PROFILE"]
          app = "MultiSOCIAL-Complete" if profile == "complete" else "MultiSOCIAL-Standard"
          root = Path("dist") / app
          blocked = {"msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll"}

          if not root.exists():
              print(f"Expected dist folder missing: {root}", file=sys.stderr)
              sys.exit(1)

          occurrences = {name: [] for name in blocked}
          for path in root.rglob("*"):
              if path.is_file():
                  name = path.name.lower()
                  if name in occurrences:
                      occurrences[name].append(path.relative_to(root))

          duplicate_hits = []
          found_any = False
          for name in sorted(blocked):
              paths = occurrences[name]
              if paths:
                  found_any = True
                  print(f"{name}: found at {', '.join(str(p) for p in paths)}")
              if len(paths) > 1:
                  duplicate_hits.extend(f"{name} -> {p}" for p in paths)

          if duplicate_hits:
              print("Blocked duplicate VC runtime DLLs found in packaged app:", file=sys.stderr)
              for hit in duplicate_hits:
                  print(f"  - {hit}", file=sys.stderr)
              sys.exit(1)

          if not found_any:
              print(
                  "No VC runtime DLLs bundled in app folder; relying on host MSVC runtime.",
                  file=sys.stderr,
              )
          else:
              print("Windows VC runtime DLL validation passed.")
          PY

      - name: Validate Windows bundled native library paths
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python -c "import os,sys; from pathlib import Path; profile=os.environ['MULTISOCIAL_BUILD_PROFILE']; app='MultiSOCIAL-Complete' if profile=='complete' else 'MultiSOCIAL-Standard'; root=Path('dist')/app; required=['audresample/core/bin/win_amd64/audresample.dll','opensmile/core/bin/win_amd64/SMILEapi.dll']; missing=[path for path in required if not (root / path).exists()]; mediapipe_hits=list(root.rglob('_framework_bindings*.pyd')); (print(f'Expected dist folder missing: {root}', file=sys.stderr), sys.exit(1)) if not root.exists() else None; (print('Missing bundled native libraries:', file=sys.stderr), [print(f'  - {path}', file=sys.stderr) for path in missing], sys.exit(1)) if missing else None; (print('Missing mediapipe _framework_bindings binary.', file=sys.stderr), sys.exit(1)) if not mediapipe_hits else None; print('Windows native library layout validation passed.')"

      - name: Validate macOS app symlink integrity
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app_name="MultiSOCIAL-Standard"
          if [[ "${MULTISOCIAL_BUILD_PROFILE}" == "complete" ]]; then
            app_name="MultiSOCIAL-Complete"
          fi
          app_path="dist/${app_name}.app"
          link_path="${app_path}/Contents/Frameworks/Python.framework/Versions/Current"
          if [[ ! -d "${app_path}" ]]; then
            echo "Expected app not found: ${app_path}" >&2
            exit 1
          fi
          if [[ ! -L "${link_path}" ]]; then
            echo "Broken app bundle layout: ${link_path} must be a symlink." >&2
            exit 1
          fi
          echo "macOS symlink integrity check passed."

      - name: Run packaged import smoke test
        shell: bash
        run: |
          set -euo pipefail
          app_name="MultiSOCIAL-Standard"
          if [[ "${MULTISOCIAL_BUILD_PROFILE}" == "complete" ]]; then
            app_name="MultiSOCIAL-Complete"
          fi

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            target="dist/${app_name}/${app_name}.exe"
          else
            target="dist/${app_name}.app/Contents/MacOS/${app_name}"
          fi

          if [[ ! -e "${target}" ]]; then
            echo "Expected executable not found: ${target}" >&2
            exit 1
          fi

          MULTISOCIAL_IMPORT_SMOKE_TEST=1 "${target}"

      - name: Archive release bundle
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          set -euo pipefail
          profile="${MULTISOCIAL_BUILD_PROFILE}"
          runner_os="$(echo "${RUNNER_OS_NAME}" | tr '[:upper:]' '[:lower:]')"
          app_name="MultiSOCIAL-Standard"
          if [[ "${profile}" == "complete" ]]; then
            app_name="MultiSOCIAL-Complete"
          fi

          mkdir -p release-artifacts

          if [[ "${runner_os}" == "macos" ]]; then
            target="dist/${app_name}.app"
            if [[ ! -d "${target}" ]]; then
              echo "Expected build output not found: ${target}" >&2
              exit 1
            fi
            # Preserve symlinks/resource forks in .app bundles.
            ditto -c -k --sequesterRsrc --keepParent "${target}" "release-artifacts/${app_name}-${runner_os}.zip"
          else
            target="dist/${app_name}"
            if [[ -d "${target}" ]]; then
              python -c "import os,shutil; app='MultiSOCIAL-Complete' if os.environ['MULTISOCIAL_BUILD_PROFILE']=='complete' else 'MultiSOCIAL-Standard'; runner=os.environ['RUNNER_OS_NAME'].lower(); shutil.make_archive(f'release-artifacts/{app}-{runner}', 'zip', root_dir='dist', base_dir=app)"
            elif [[ -f "${target}" ]]; then
              cp "${target}" "release-artifacts/${app_name}-${runner_os}${target##${app_name}}"
            else
              echo "Expected build output not found: ${target}" >&2
              exit 1
            fi
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: MultiSOCIAL-${{ matrix.profile }}-${{ runner.os }}
          path: release-artifacts/*

      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
