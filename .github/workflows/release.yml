name: Build Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        profile: [standard, complete]

    runs-on: ${{ matrix.os }}
    env:
      MULTISOCIAL_BUILD_PROFILE: ${{ matrix.profile }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install standard build dependencies
        if: matrix.profile == 'standard'
        run: python -m pip install ".[dev]"

      - name: Install complete build dependencies
        if: matrix.profile == 'complete'
        run: python -m pip install ".[complete,dev]"

      - name: Build PyInstaller bundle
        env:
          MPLCONFIGDIR: ${{ github.workspace }}/.tmp/mplconfig-${{ matrix.os }}-${{ matrix.profile }}
          PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}/.tmp/pyinstaller-${{ matrix.os }}-${{ matrix.profile }}
        run: pyinstaller --clean --noconfirm MultiSOCIAL.spec

      - name: Archive release bundle
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          set -euo pipefail
          profile="${MULTISOCIAL_BUILD_PROFILE}"
          runner_os="$(echo "${RUNNER_OS_NAME}" | tr '[:upper:]' '[:lower:]')"
          app_name="MultiSOCIAL-Standard"
          if [[ "${profile}" == "complete" ]]; then
            app_name="MultiSOCIAL-Complete"
          fi

          mkdir -p release-artifacts

          if [[ "${runner_os}" == "macos" ]]; then
            target="dist/${app_name}.app"
            if [[ ! -d "${target}" ]]; then
              echo "Expected build output not found: ${target}" >&2
              exit 1
            fi
            # Preserve symlinks/resource forks in .app bundles.
            ditto -c -k --sequesterRsrc --keepParent "${target}" "release-artifacts/${app_name}-${runner_os}.zip"
          else
            target="dist/${app_name}"
            if [[ -d "${target}" ]]; then
              python -c "import os,shutil; app='MultiSOCIAL-Complete' if os.environ['MULTISOCIAL_BUILD_PROFILE']=='complete' else 'MultiSOCIAL-Standard'; runner=os.environ['RUNNER_OS_NAME'].lower(); shutil.make_archive(f'release-artifacts/{app}-{runner}', 'zip', root_dir='dist', base_dir=app)"
            elif [[ -f "${target}" ]]; then
              cp "${target}" "release-artifacts/${app_name}-${runner_os}${target##${app_name}}"
            else
              echo "Expected build output not found: ${target}" >&2
              exit 1
            fi
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: MultiSOCIAL-${{ matrix.profile }}-${{ runner.os }}
          path: release-artifacts/*

      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
